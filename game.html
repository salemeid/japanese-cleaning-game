<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean-Up Time! - お掃除タイム</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #120800;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
  }
  #title {
    color: #ffcc66;
    font-size: 20px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px #ff8800;
  }
  canvas {
    border: 4px solid #7a4010;
    box-shadow: 0 0 30px #7a401044;
    image-rendering: pixelated;
    display: block;
  }
  #controls {
    color: #998866;
    font-size: 11px;
    margin-top: 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="title">お掃除タイム！  CLEAN-UP TIME!</div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls">ARROW KEYS / WASD to move &nbsp;&nbsp;|&nbsp;&nbsp; Collect 50 garbage then touch a corner BIN to empty</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
const HUD_H = 42;
const WALL = 14;
const ROOM_TOP = HUD_H;
const TILE = 18;
const MAX_GARBAGE = 35;
const FULL = 50;

const BINS = [
  { x: WALL,        y: ROOM_TOP + WALL,  w: 58, h: 58 },
  { x: W-WALL-58,   y: ROOM_TOP + WALL,  w: 58, h: 58 },
  { x: WALL,        y: H - WALL - 58,    w: 58, h: 58 },
  { x: W-WALL-58,   y: H - WALL - 58,    w: 58, h: 58 },
];

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

let frame = 0;
let score = 0;
let phase = 'playing';
let garbageList = [];
let sparks = [];
let binFlash = 0;

const lady = {
  x: 400, y: 320,
  speed: 3,
  dir: 'right',
  moving: false,
  count: 0,
};

const kid = {
  x: 220, y: 220,
  speed: 1.6,   // baby crawls slower
  dx: 1, dy: 0,
  dirTimer: 80,
  dropTimer: 140,
  throwAnim: 0,
};

// ─── Pixel fill helper ───────────────────────────────────────────────────────
function px(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x, y, w, h);
}

// ─── Draw Floor & Walls ──────────────────────────────────────────────────────
function drawRoom() {
  for (let ty = ROOM_TOP; ty < H; ty += TILE) {
    for (let tx = 0; tx < W; tx += TILE) {
      const alt = (Math.floor(tx / TILE) + Math.floor((ty - ROOM_TOP) / TILE)) % 2;
      ctx.fillStyle = alt ? '#c9b87a' : '#d8c888';
      ctx.fillRect(tx, ty, TILE, TILE);
      ctx.strokeStyle = '#b8a460';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(tx + 0.5, ty + 0.5, TILE - 1, TILE - 1);
    }
  }

  ctx.fillStyle = '#7a4820';
  ctx.fillRect(0, ROOM_TOP, W, WALL);
  ctx.fillRect(0, H - WALL, W, WALL);
  ctx.fillRect(0, ROOM_TOP, WALL, H - ROOM_TOP);
  ctx.fillRect(W - WALL, ROOM_TOP, WALL, H - ROOM_TOP);

  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 1;
  for (let wx = 30; wx < W; wx += 30) {
    ctx.beginPath(); ctx.moveTo(wx, ROOM_TOP); ctx.lineTo(wx, ROOM_TOP + WALL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(wx, H - WALL); ctx.lineTo(wx, H); ctx.stroke();
  }
  for (let wy = ROOM_TOP + 30; wy < H; wy += 30) {
    ctx.beginPath(); ctx.moveTo(0, wy); ctx.lineTo(WALL, wy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - WALL, wy); ctx.lineTo(W, wy); ctx.stroke();
  }

  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 2;
  ctx.strokeRect(WALL, ROOM_TOP + WALL, W - WALL * 2, H - ROOM_TOP - WALL * 2);

  const doorW = 100, doorH = 10, doorY = ROOM_TOP + 2;
  ctx.fillStyle = '#f0e0b0';
  ctx.fillRect(W/2 - doorW, doorY, doorW, doorH);
  ctx.fillRect(W/2 + 2, doorY, doorW, doorH);
  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 1;
  ctx.strokeRect(W/2 - doorW, doorY, doorW, doorH);
  ctx.strokeRect(W/2 + 2, doorY, doorW, doorH);
  for (let dp = 0; dp < 4; dp++) {
    ctx.strokeRect(W/2 - doorW + dp * 25, doorY, 25, doorH);
    ctx.strokeRect(W/2 + 2 + dp * 25, doorY, 25, doorH);
  }
}

// ─── Draw Corner Bins ────────────────────────────────────────────────────────
function drawBins() {
  BINS.forEach(bin => {
    px(bin.x, bin.y, bin.w, bin.h, '#3a1e00');
    px(bin.x + 4, bin.y, bin.w - 8, 10, '#5a3210');
    px(bin.x + bin.w - 8, bin.y + 10, 8, bin.h - 10, '#2a1400');
    ctx.fillStyle = '#4a2800';
    for (let s = 14; s < bin.h - 4; s += 8)
      ctx.fillRect(bin.x + 4, bin.y + s, bin.w - 8, 3);
    ctx.fillStyle = '#ffcc66';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BIN', bin.x + bin.w / 2, bin.y + bin.h / 2 + 4);
    ctx.font = '8px monospace';
    ctx.fillText('EMPTY', bin.x + bin.w / 2, bin.y + bin.h / 2 + 14);

    if (phase === 'full' && frame % 40 < 22) {
      ctx.strokeStyle = `rgba(255,80,80,${0.5 + Math.sin(frame * 0.2) * 0.5})`;
      ctx.lineWidth = 3;
      ctx.strokeRect(bin.x - 3, bin.y - 3, bin.w + 6, bin.h + 6);
    }
    if (binFlash > 0) {
      ctx.fillStyle = `rgba(255,255,200,${binFlash / 20})`;
      ctx.fillRect(bin.x, bin.y, bin.w, bin.h);
    }
  });
}

// ─── Draw Garbage (bigger items ~20–24px) ────────────────────────────────────
function drawGarbage() {
  garbageList.forEach(g => {
    const gx = Math.round(g.x), gy = Math.round(g.y);
    switch (g.type) {
      case 0: // crumpled paper
        px(gx-12, gy-10, 24, 20, '#ddd8c0');
        px(gx - 7, gy - 6, 14, 12, '#c8c4a8');
        px(gx - 2, gy-10,  4,  5, '#bbb890');
        px(gx + 4, gy - 2,  6,  5, '#d0ccb0');
        px(gx - 8, gy + 2,  5,  5, '#c0bc98');
        break;
      case 1: // candy wrapper
        px(gx-12, gy - 8, 24, 16, '#ffdd00');
        px(gx-12, gy - 8,  9, 16, '#ff7700');
        px(gx + 3, gy - 8,  9, 16, '#ff3300');
        px(gx + 7, gy - 3,  5,  6, '#ffee44');
        px(gx-12, gy - 2,  4,  8, '#ff9900');
        break;
      case 2: // banana peel
        px(gx - 4, gy-14,  8, 28, '#e8e000');
        px(gx-12, gy - 5, 10, 12, '#c8c000');
        px(gx + 2, gy - 5, 10, 12, '#c0b800');
        px(gx - 2, gy + 10,  4,  6, '#a09000');
        px(gx - 6, gy-12,  4,  6, '#d8d000');
        break;
      case 3: // soda can
        px(gx-10, gy-14, 20, 28, '#c8c8c8');
        px(gx-10, gy-14, 20,  6, '#909090');
        px(gx-10, gy + 8, 20,  6, '#909090');
        px(gx - 5, gy - 8, 10, 16, '#ee2222');
        px(gx - 2, gy - 2,  4,  6, '#ffffff');
        px(gx - 3, gy-12,  6,  4, '#aaaaaa');
        break;
      case 4: // chip bag
        px(gx-10, gy-12, 20, 24, '#ff8800');
        px(gx - 5, gy-12, 10,  8, '#ffaa00');
        px(gx - 5, gy + 4, 10,  8, '#cc6600');
        px(gx-10, gy - 2,  5,  8, '#dd6600');
        px(gx + 5, gy - 2,  5,  8, '#ee7700');
        break;
    }
  });
}

// ─── Draw Sparks ─────────────────────────────────────────────────────────────
function drawSparks() {
  sparks = sparks.filter(s => s.life > 0);
  sparks.forEach(s => {
    ctx.globalAlpha = s.life / 16;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, (16 - s.life) * 1.4, 0, Math.PI * 2);
    ctx.fill();
    s.life--;
  });
  ctx.globalAlpha = 1;
}

// ─── Lady sprite (on all fours, canonical = facing right, origin = center) ──
function drawLadySprite(clothLen) {
  const C  = '#cc2255';  // kimono
  const CD = '#aa1840';  // kimono dark/fold
  const CE = '#dd3366';  // kimono highlight
  const S  = '#f0b880';  // skin
  const H  = '#1a0800';  // hair
  const WH = '#f0f0f0';  // tabi socks
  const O  = '#e8a020';  // obi gold
  const OS = '#ffcc44';  // obi shine
  const CL = '#e8f4ff';  // cloth light
  const CLD= '#b0d0e8';  // cloth shade

  // ── Tabi socks / feet (back) ──
  px(-38, -10, 14,  8, WH);
  px(-38,   2, 14,  8, WH);
  px(-38, -10,  6, 20, S);   // ankle skin peek

  // ── Lower kimono / hips ──
  px(-26, -14, 22, 28, CD);
  px(-22, -12, 16, 24, C);

  // ── Obi belt ──
  px( -6, -12, 10, 24, O);
  px( -4, -10,  6, 20, OS);

  // ── Torso ──
  px(  2, -12, 22, 24, C);
  px(  4, -10, 18, 20, CE);

  // ── Shoulder area ──
  px( 22, -14, 12, 28, CD);

  // ── Arms reaching forward ──
  px( 32, -20, 16, 10, S);
  px( 32,  10, 16, 10, S);

  // ── Hands ──
  px( 46, -20, 10,  8, S);
  px( 46,  10, 10,  8, S);

  // ── Neck ──
  px( 32,  -5, 10, 10, S);

  // ── Head ──
  px( 36, -12, 20, 24, S);
  px( 34,  -8, 24, 16, S);   // rounder sides

  // ── Hair bun ──
  px( 38, -18, 12,  8, H);
  px( 42, -22,  8,  6, H);
  px( 40, -18, 10,  4, '#2a1000');  // bun detail

  // ── Face ──
  px( 38,  -4,  4,  4, H);           // L eye
  px( 48,  -4,  4,  4, H);           // R eye
  px( 39,  -5,  2,  2, '#ffffff');   // L shine
  px( 49,  -5,  2,  2, '#ffffff');   // R shine
  px( 38,   4,  2,  2, '#e07060');   // L blush
  px( 46,   4,  2,  2, '#e07060');   // R blush
  px( 39,   6,  8,  3, '#cc6050');   // mouth

  // ── Fiber cloth (extends right in local space) ──
  px( 56,  -6, clothLen, 12, CL);
  px( 56,  -3, clothLen,  6, CLD);
}

function drawLady() {
  const { x, y, dir, moving } = lady;
  const clothLen = moving ? Math.round(10 + Math.abs(Math.sin(frame * 0.35)) * 16) : 8;

  if (phase === 'full' && frame % 18 < 9) ctx.globalAlpha = 0.5;

  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if      (dir === 'left') ctx.scale(-1, 1);
  else if (dir === 'down') ctx.rotate(Math.PI / 2);
  else if (dir === 'up')   ctx.rotate(-Math.PI / 2);

  drawLadySprite(clothLen);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ─── Baby sprite (crawling, canonical = facing right, origin = center) ───────
function drawBabySprite(dropping) {
  const S  = '#f8c094';  // baby skin
  const D  = '#f0f0f0';  // diaper white
  const DF = '#d0d8e0';  // diaper fold/shade
  const H  = '#2a1800';  // sparse baby hair
  const BD = '#88aadd';  // blue onesie
  const BK = '#ffaaaa';  // blush pink

  // Crawl cycle: alternate arm pairs each 20 frames
  const crawl = frame % 20 < 10;
  const arm1Y = crawl ? -18 : -13;  // left arm
  const arm2Y = crawl ?   6 :  10;  // right arm
  const leg1Y = crawl ?  -9 : -12;  // left knee
  const leg2Y = crawl ?   4 :   6;  // right knee

  // ── Bare feet (back) ──
  px(-28,  -8, 12, 7, S);
  px(-28,   2, 12, 7, S);
  px(-28,  -8,  5, 4, '#e8a060');  // L big toe area
  px(-28,   2,  5, 4, '#e8a060');  // R big toe area

  // ── Chubby legs/knees (animated) ──
  px(-18, leg1Y, 16, 9, BD);
  px(-18, leg2Y, 16, 9, BD);

  // ── Big puffy diaper ──
  px( -6, -14, 20, 28, D);
  px( -2, -12, 12, 24, DF);
  px(  0, -14,  2, 28, D);  // center fold line

  // ── Onesie body ──
  px( 12, -12, 16, 24, BD);
  // Cute belly peek (chubby baby tummy)
  px( 14,  -4,  6,  8, S);

  // ── Chubby arms (animated) ──
  px( 24, arm1Y, 16,  9, S);
  px( 24, arm2Y, 16,  9, S);

  // ── Little fists ──
  px( 38, arm1Y - 1,  9,  9, S);
  px( 38, arm2Y - 1,  9,  9, S);
  // fist finger line
  px( 40, arm1Y + 3,  5,  2, '#e8a060');
  px( 40, arm2Y + 3,  5,  2, '#e8a060');

  // ── Big round baby head (no neck) ──
  px( 24, -16, 26, 32, S);   // main head block
  px( 22, -12, 30, 24, S);   // wider middle for round look
  px( 26, -18, 10,  4, S);   // top connect

  // ── Sparse baby hair wisps ──
  px( 30, -22,  4,  6, H);
  px( 35, -24,  6,  4, H);
  px( 41, -22,  4,  6, H);

  // ── Baby face ──
  // Big eyes (wide and cute)
  px( 26,  -5,  7,  7, '#1a0800');
  px( 38,  -5,  7,  7, '#1a0800');
  px( 27,  -6,  3,  3, '#ffffff');  // L shine
  px( 39,  -6,  3,  3, '#ffffff');  // R shine
  // Chubby rosy cheeks
  px( 24,   3,  7,  5, BK);
  px( 40,   3,  7,  5, BK);
  // Little button nose
  px( 32,  -1,  5,  4, '#e09070');
  // Mouth
  if (dropping) {
    px( 28,   7, 12,  6, '#dd3030');  // open laughing mouth
    px( 30,   8,  8,  5, '#ffffff');  // teeth/inside
  } else {
    px( 29,   7, 10,  4, '#cc6050');  // cute little smile
    px( 30,   8,  8,  2, '#ff9090');  // lip highlight
  }
}

function drawKid() {
  const { x, y, throwAnim, dx, dy } = kid;

  // Direction from velocity
  let dir = 'right';
  if (Math.abs(dx) >= Math.abs(dy)) dir = dx >= 0 ? 'right' : 'left';
  else dir = dy >= 0 ? 'down' : 'up';

  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if      (dir === 'left') ctx.scale(-1, 1);
  else if (dir === 'down') ctx.rotate(Math.PI / 2);
  else if (dir === 'up')   ctx.rotate(-Math.PI / 2);

  drawBabySprite(throwAnim > 0);
  ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  px(0, 0, W, HUD_H, '#1e0c00');
  ctx.strokeStyle = '#7a4010';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, HUD_H);

  ctx.fillStyle = '#ffcc66';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`GARBAGE: ${lady.count}/${FULL}`, 12, 16);

  const barX = 12, barY = 22, barW = 160, barH = 12;
  px(barX, barY, barW, barH, '#111');
  const barCol = lady.count < 20 ? '#44dd44' : lady.count < 40 ? '#ffaa22' : '#ff3333';
  px(barX, barY, Math.round((lady.count / FULL) * barW), barH, barCol);
  ctx.strokeStyle = '#888866';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = '#ffcc66';
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`SCORE: ${score}`, W / 2, 26);

  if (phase === 'full' && frame % 36 < 18) {
    ctx.fillStyle = '#ff2222';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('[!!] GO EMPTY AT CORNER!', W - 10, 26);
  }
}

// ─── Update Lady ─────────────────────────────────────────────────────────────
function updateLady() {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx =  1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy = -1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy =  1;

  lady.moving = dx !== 0 || dy !== 0;
  if (lady.moving) {
    if (Math.abs(dx) >= Math.abs(dy)) lady.dir = dx > 0 ? 'right' : 'left';
    else lady.dir = dy > 0 ? 'down' : 'up';
  }

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  // Margins account for the bigger sprite (body spans ~38px back, ~22px sides)
  lady.x = Math.max(WALL + 42, Math.min(W - WALL - 42, lady.x + dx * lady.speed));
  lady.y = Math.max(ROOM_TOP + WALL + 28, Math.min(H - WALL - 28, lady.y + dy * lady.speed));
}

// ─── Update Kid (Baby) ───────────────────────────────────────────────────────
function updateKid() {
  kid.dirTimer--;
  if (kid.dirTimer <= 0) {
    kid.dirTimer = 55 + Math.random() * 110 | 0;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1],[0.7,0.7],[0.7,-0.7],[-0.7,0.7],[-0.7,-0.7]];
    const d = dirs[Math.random() * dirs.length | 0];
    kid.dx = d[0]; kid.dy = d[1];
  }

  kid.x += kid.dx * kid.speed;
  kid.y += kid.dy * kid.speed;

  // Bounds: baby sprite is ~30px back, ~16px sides
  if (kid.x < WALL + 32)      { kid.x = WALL + 32;      kid.dx =  Math.abs(kid.dx); }
  if (kid.x > W - WALL - 32)  { kid.x = W - WALL - 32;  kid.dx = -Math.abs(kid.dx); }
  if (kid.y < ROOM_TOP + WALL + 26) { kid.y = ROOM_TOP + WALL + 26; kid.dy =  Math.abs(kid.dy); }
  if (kid.y > H - WALL - 26)        { kid.y = H - WALL - 26;        kid.dy = -Math.abs(kid.dy); }

  if (kid.throwAnim > 0) kid.throwAnim--;

  kid.dropTimer--;
  if (kid.dropTimer <= 0) {
    kid.dropTimer = 110 + Math.random() * 130 | 0;
    kid.throwAnim = 12;
    const angle = Math.random() * Math.PI * 2;
    const dist = 24 + Math.random() * 44;
    const gx = Math.max(WALL + 16, Math.min(W - WALL - 16, kid.x + Math.cos(angle) * dist));
    const gy = Math.max(ROOM_TOP + WALL + 16, Math.min(H - WALL - 16, kid.y + Math.sin(angle) * dist));
    if (garbageList.length >= MAX_GARBAGE) garbageList.shift();
    garbageList.push({ x: gx, y: gy, type: Math.random() * 5 | 0 });
  }
}

// ─── Collision Detection ──────────────────────────────────────────────────────
function checkCollisions() {
  // Larger hitbox to match the bigger lady sprite
  const HR = 26;
  garbageList = garbageList.filter(g => {
    if (Math.abs(g.x - lady.x) < HR && Math.abs(g.y - lady.y) < HR) {
      lady.count++;
      score += 10;
      sparks.push({ x: g.x, y: g.y, life: 14, color: '#ffffaa' });
      if (lady.count >= FULL) phase = 'full';
      return false;
    }
    return true;
  });

  if (phase === 'full') {
    BINS.forEach(bin => {
      if (lady.x > bin.x && lady.x < bin.x + bin.w &&
          lady.y > bin.y && lady.y < bin.y + bin.h) {
        score += 50;
        lady.count = 0;
        phase = 'playing';
        binFlash = 20;
        sparks.push({ x: bin.x + bin.w / 2, y: bin.y + bin.h / 2, life: 20, color: '#ffffff' });
      }
    });
  }

  if (binFlash > 0) binFlash--;
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
function loop() {
  frame++;

  updateLady();
  updateKid();
  checkCollisions();

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawRoom();
  drawBins();
  drawGarbage();
  drawSparks();
  drawLady();
  drawKid();
  drawHUD();

  requestAnimationFrame(loop);
}

// Seed starting garbage
for (let i = 0; i < 6; i++) {
  garbageList.push({
    x: WALL + 50 + Math.random() * (W - WALL * 2 - 100),
    y: ROOM_TOP + WALL + 50 + Math.random() * (H - ROOM_TOP - WALL * 2 - 100),
    type: Math.random() * 5 | 0,
  });
}

requestAnimationFrame(loop);
</script>
</body>
</html>
